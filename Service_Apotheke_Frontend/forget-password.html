<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort vergessen - ServiceApotheke</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="Service Apotheke.png">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-container img { height: 65px; width: auto; object-fit: contain; }
        h2 { margin-top: 0; color: #1e3a8a; text-align: center; font-size: 26px; margin-bottom: 20px; }
        
        .form-control { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 15px; font-size: 16px; transition: border-color 0.3s; }
        .form-control:focus { border-color: #3b82f6; outline: none; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; background: #1e3a8a; color: white; font-weight: bold; transition: background-color 0.3s; margin-bottom: 10px; font-size: 18px; }
        .btn:hover { background: #152b66; }
        
        .switch-role { display: flex; gap: 10px; margin-bottom: 20px; background: #f8fafc; border-radius: 8px; padding: 5px; border: 1px solid #e2e8f0; }
        .role-btn { flex: 1; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; color: #64748b; font-weight: bold; transition: all 0.3s; }
        .role-btn.active { background: white; color: #1e3a8a; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .toast { padding: 14px 20px; border-radius: 8px; margin-bottom: 15px; display: none; text-align: center; font-size: 14px; font-weight: bold; }
        .toast.success { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
        .toast.error { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        
        #step2Form { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-container">
            <img src="Service Apotheke.png" alt="Service Apotheke Logo">
        </div>
        <h2>Passwort zurücksetzen</h2>
        
        <div id="toast" class="toast"></div>

        <div class="switch-role">
            <div class="role-btn active" onclick="setRole('pharmacist', this)">Apotheker/in</div>
            <div class="role-btn" onclick="setRole('pharmacy', this)">Apotheke</div>
        </div>

        <form id="step1Form">
            <input type="email" id="email" class="form-control" placeholder="Ihre E-Mail-Adresse" required>
            <button type="submit" class="btn">Code anfordern</button>
            <div style="text-align: center; margin-top: 15px;">
                <a href="login.html" style="color: #3b82f6; font-size: 15px; font-weight: 600; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#1e3a8a'" onmouseout="this.style.color='#3b82f6'">Zurück zum Login</a>
            </div>
        </form>

        <form id="step2Form">
            <p style="font-size: 14px; color: #64748b; text-align: center; margin-bottom: 15px; font-weight: 600;">Geben Sie den 6-stelligen Code aus der E-Mail ein.</p>
            <input type="text" id="token" class="form-control" placeholder="6-stelliger Code" required>
            <input type="password" id="newPassword" class="form-control" placeholder="Neues Passwort" required>
            <button type="submit" class="btn">Passwort speichern</button>
        </form>
    </div>

    <script>
        const API_URL = "https://serviceapotheke-api-830781040278.europe-west3.run.app/api";
        let currentRole = 'pharmacist';

        function setRole(role, element) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function showMessage(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${isError ? 'error' : 'success'}`;
            toast.innerText = msg;
            toast.style.display = 'block';
        }

        document.getElementById('step1Form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = e.target.querySelector('button');
            
            btn.disabled = true;
            btn.innerText = "Wird gesendet...";

            try {
                const res = await fetch(`${API_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, role: currentRole })
                });

                if (res.ok) {
                    showMessage("Code gesendet! Bitte E-Mails prüfen.");
                    document.getElementById('step1Form').style.display = 'none';
                    document.getElementById('step2Form').style.display = 'block';
                } else {
                    showMessage("Fehler bei der Anforderung. E-Mail nicht gefunden?", true);
                }
            } catch { 
                showMessage("Netzwerkfehler", true); 
            } finally {
                btn.disabled = false;
                btn.innerText = "Code anfordern";
            }
        });

        document.getElementById('step2Form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('email').value.trim(),
                token: document.getElementById('token').value.trim(),
                newPassword: document.getElementById('newPassword').value,
                role: currentRole
            };
            const btn = e.target.querySelector('button');

            btn.disabled = true;
            btn.innerText = "Wird gespeichert...";

            try {
                const res = await fetch(`${API_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json().catch(() => ({}));
                
                if (res.ok) {
                    showMessage("Passwort erfolgreich geändert. Leite zum Login weiter...");
                    setTimeout(() => window.location.href = "login.html", 2000);
                } else {
                    showMessage(data.message || "Falscher Code oder Fehler aufgetreten.", true);
                    btn.disabled = false;
                    btn.innerText = "Passwort speichern";
                }
            } catch { 
                showMessage("Netzwerkfehler", true); 
                btn.disabled = false;
                btn.innerText = "Passwort speichern";
            }
        });
    </script>
</body>
</html>
