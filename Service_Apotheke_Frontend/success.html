<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahlung Erfolgreich - ServiceApotheke</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1f2937;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #d1fae5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #111827;
        }
        p {
            font-size: 16px;
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .timer {
            font-weight: 600;
            color: #2563eb;
        }
        .btn {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="success-icon">✓</div>
    <h1>Zahlung Erfolgreich!</h1>
    <p>Vielen Dank. Ihre Zahlung wurde erfolgreich verarbeitet und Ihre Rechnung wird in wenigen Minuten als "Bezahlt" markiert.</p>
    <p>Sie werden in <span class="timer" id="countdown">5</span> Sekunden automatisch zu Ihrem Dashboard weitergeleitet.</p>
    <a href="/Apotheken/index.html" class="btn">Jetzt zum Dashboard</a>
</div>

<script>
    let seconds = 5;
    const countdownEl = document.getElementById('countdown');
    
    const interval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;
        
        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = '/Apotheken/index.html';
        }
    }, 1000);
</script>

</body>
</html>
