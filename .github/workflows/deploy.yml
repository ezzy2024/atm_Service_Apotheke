name: Go-To-Market Production Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & E2E Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Static Build Verification
        run: npm run build

      - name: Run E2E Tests (Strict Gating)
        run: npx playwright test
        env:
          NODE_ENV: test
          # Inject secrets from GitHub Actions
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only run if tests passed with exit code 0
    if: success()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH & Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/service-apotheke-atm
            git pull origin main
            
            # Write Production Env Variables
            echo "NODE_ENV=production" > .env
            echo "PORT=4000" >> .env
            echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
            echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env
            echo "VITE_STRIPE_PUBLIC_KEY=${{ secrets.VITE_STRIPE_PUBLIC_KEY }}" >> .env
            echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" >> .env
            echo "VITE_JITSI_DOMAIN=${{ secrets.VITE_JITSI_DOMAIN }}" >> .env
            
            # Restart Infrastructure
            docker-compose down
            docker-compose build
            docker-compose up -d
